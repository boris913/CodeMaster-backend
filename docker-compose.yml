version: '3.8'

services:
  # docker-compose.yml
  code-runner:
    build: ./sandbox
    environment:
      - PORT=4001
    networks:
      - sandbox-network  # réseau isolé, pas accès à postgres/redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      
  postgres:
    image: postgres:15-alpine
    container_name: codemaster-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: codemaster
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codemaster-network

  redis:
    image: redis:7-alpine
    container_name: codemaster-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - codemaster-network
    command: redis-server --appendonly yes

  pgadmin:
    image: dpage/pgadmin4
    container_name: codemaster-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@codemaster.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - codemaster-network

volumes:
  postgres_data:
  redis_data:

networks:
  codemaster-network:
    driver: bridge
